spring:
  application:
    name: oi-analyzer-service
  webflux:
    base-path: /api

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: false
  jetty:
    threads:
      max: 200
      min: 10
    accept-queue-size: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        market.data.message.latency: true

upstox:
  api:
    base-url: https://api.upstox.com/
    client-id: ${UPSTOX_CLIENT_ID}
    client-secret: ${UPSTOX_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/callback
    connect-timeout: 5000
    read-timeout: 10000
  market-data:
    instruments: NSE_FO|45450,NSE_INDEX|Nifty Bank
    mode: ltpc
    max-keys-limit: 5000
    max-connections: 2
    reconnect:
      initial-delay: 1000
      max-delay: 30000
      max-retries: 5

logging:
  level:
    root: WARN
    com.oi.market: INFO
    org.springframework.web: ERROR
    org.eclipse.jetty: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/oi-analyzer-service.log
    max-size: 100MB
    max-history: 10
