syntax = "proto3";
package com.upstox.marketdatafeederv3udapi.rpc.proto;

option java_package = "com.upstox.marketdatafeederv3udapi.rpc.proto";
option java_outer_classname = "MarketDataFeedProto";

// LTPC - Last Trade Price and Quantity
message LTPC {
  double ltp = 1;        // Last traded price
  int64 ltt = 2;         // Last traded timestamp
  int64 ltq = 3;         // Last traded quantity
  double cp = 4;         // Close price
}

// Market Depth Quote
message Quote {
  int64 bidQ = 1;        // Bid quantity
  double bidP = 2;       // Bid price
  int64 askQ = 3;        // Ask quantity
  double askP = 4;       // Ask price
}

// Market Level (Depth)
message MarketLevel {
  repeated Quote bidAskQuote = 1;
}

// OHLC - Open High Low Close
message OHLC {
  string interval = 1;   // Interval (1min, 5min, etc)
  double open = 2;       // Open price
  double high = 3;       // High price
  double low = 4;        // Low price
  double close = 5;      // Close price
  int64 vol = 6;         // Volume
  int64 ts = 7;          // Timestamp
}

// Market OHLC Collection
message MarketOHLC {
  repeated OHLC ohlc = 1;
}

// Option Greeks (Delta, Gamma, Vega, Rho, Theta)
message OptionGreeks {
  double delta = 1;      // Delta
  double theta = 2;      // Theta
  double gamma = 3;      // Gamma
  double vega = 4;       // Vega
  double rho = 5;        // Rho
}

// Full Market Feed Data
message MarketFullFeed {
  LTPC ltpc = 1;
  MarketLevel marketLevel = 2;
  OptionGreeks optionGreeks = 3;
  MarketOHLC marketOHLC = 4;
  double atp = 5;        // Average traded price
  int64 vtt = 6;         // Volume traded today
  double oi = 7;         // Open interest
  double iv = 8;         // Implied volatility
  double tbq = 9;        // Total buy quantity
  double tsq = 10;       // Total sell quantity
}

// Index Full Feed Data
message IndexFullFeed {
  LTPC ltpc = 1;
  MarketOHLC marketOHLC = 2;
}

// Full Feed Union Type
message FullFeed {
  oneof FullFeedUnion {
    MarketFullFeed marketFF = 1;
    IndexFullFeed indexFF = 2;
  }
}

// First Level with Greeks
message FirstLevelWithGreeks {
  LTPC ltpc = 1;
  Quote firstDepth = 2;
  OptionGreeks optionGreeks = 3;
  int64 vtt = 4;         // Volume traded today
  double oi = 5;         // Open interest
  double iv = 6;         // Implied volatility
}

// Request Mode Enum
enum RequestMode {
  ltpc = 0;
  full_d5 = 1;
  option_greeks = 2;
  full_d30 = 3;
}

// Individual Feed Data
message Feed {
  oneof FeedUnion {
    LTPC ltpc = 1;
    FullFeed fullFeed = 2;
    FirstLevelWithGreeks firstLevelWithGreeks = 3;
  }
  RequestMode requestMode = 4;
}

// Market Status Enum
enum MarketStatus {
  PRE_OPEN_START = 0;
  PRE_OPEN_END = 1;
  NORMAL_OPEN = 2;
  NORMAL_CLOSE = 3;
  CLOSING_START = 4;
  CLOSING_END = 5;
}

// Market Information
message MarketInfo {
  map<string, MarketStatus> segmentStatus = 1;
}

// Feed Type Enum
enum Type {
  initial_feed = 0;
  live_feed = 1;
  market_info = 2;
}

// Feed Response - Main message from WebSocket
message FeedResponse {
  Type type = 1;
  map<string, Feed> feeds = 2;
  int64 currentTs = 3;
  MarketInfo marketInfo = 4;
}
